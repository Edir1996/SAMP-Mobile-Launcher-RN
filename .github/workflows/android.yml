name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # Configura o Node.js
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18' 

    # Instala as dependências ignorando conflitos de versão
    - name: Install dependencies
      run: npm install --legacy-peer-deps

    # Configura o Java
    - name: set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    # Dá permissão para o Gradle
    - name: Grant execute permission for gradlew
      working-directory: ./android
      run: chmod +x gradlew
      
    # Faz a compilação final do APK
    - name: Build with Gradle
      working-directory: ./android
      run: ./gradlew build
