name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # --- INÍCIO DA CORREÇÃO: Configurando Node e instalando dependências ---
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18' # Versão estável e recomendada para React Native

    - name: Install dependencies
      run: npm install
    # --- FIM DA CORREÇÃO ---

    - name: set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      working-directory: ./android
      run: chmod +x gradlew
      
    - name: Build with Gradle
      working-directory: ./android
      run: ./gradlew build
